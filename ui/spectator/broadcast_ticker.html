<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ChronoCore - Broadcast Ticker</title>
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="/ui/css/base.css?v=1" />
  <link rel="stylesheet" href="/ui/css/broadcast_tower.css?v=1" />
  <script src="/ui/js/base.js?v=1" defer></script>
  <script src="/ui/js/broadcast_tower.js?v=1" defer></script>
</head>
<body class="broadcast-overlay">
  <div id="broadcastRoot" class="broadcast broadcast--pre mode-ticker" data-mode="ticker">
    <section id="intervalBar" class="interval-bar" aria-label="Intervals ticker">
      <div class="interval-label">Intervals</div>
      <div class="interval-viewport">
        <div class="interval-track" id="intervalTrack"></div>
      </div>
    </section>
  </div>
</body>
</html>
